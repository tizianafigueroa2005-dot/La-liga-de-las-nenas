<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Liga de las Nenas - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(to bottom, #ff7bc1, #ffb3d9, #ffffff); min-height: 100vh; margin: 0; scroll-behavior: smooth; }
        .oswald { font-family: 'Oswald', sans-serif; }
        .header-text { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .tab-btn { background-color: rgba(255, 255, 255, 0.3); color: #4a3b4d; border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .tab-btn.active { background: linear-gradient(to bottom, #e6338a, #c2185b); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-color: transparent; }
        .category-tab { border-bottom: 3px solid transparent; color: #94a3b8; font-weight: 900; text-transform: uppercase; font-size: 12px; padding: 10px 0; transition: all 0.3s; }
        .category-tab.active { border-bottom: 3px solid #e6338a; color: #e6338a; }
        .view-section, .sub-view { display: none; }
        .view-section.active, .sub-view.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        #modal-container, #dni-modal-container, #confirm-modal, #match-detail-modal, #create-match-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px; }
        .id-card { width: 330px; height: 210px; background: white; border-radius: 18px; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.8); margin: auto; }
        .id-card-header { background: linear-gradient(to right, #e6338a, #c2185b); height: 55px; padding: 10px 15px; color: white; display: flex; align-items: center; gap: 10px; }
        .id-card-body { display: flex; padding: 15px; gap: 15px; position: relative; }
        .id-photo { width: 90px; height: 110px; background: #f1f5f9; border: 3px solid #ff7bc1; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 10; }
        .id-photo img { width: 100%; height: 100%; object-fit: cover; }
        .id-details { flex: 1; z-index: 10; }
        .id-label { font-size: 8px; color: #94a3b8; text-transform: uppercase; font-weight: 900; margin-bottom: -1px; }
        .id-value { font-size: 13px; color: #1e293b; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; line-height: 1.1; }
        .id-footer { position: absolute; bottom: 0; width: 100%; height: 28px; background: #2d1b2e; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #ffb3d9; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e6338a; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #btnVolverArriba { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 90; background: linear-gradient(to bottom, #ff4db8, #d63384); color: white; padding: 0.75rem; border-radius: 9999px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 2px solid white; transition: all 0.3s ease; }
        .category-btn-active { background-color: #ff4db8; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-btn-inactive { background-color: rgba(255, 255, 255, 0.3); color: #4a3b4d; }
        .table-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); }
        .table-header-cell { padding: 12px 6px; font-size: 9px; text-transform: uppercase; font-weight: 900; color: #94a3b8; letter-spacing: 0.05em; }
        .table-row { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .pts-cell { background-color: #fff1f8; color: #e6338a; font-weight: 900; font-size: 13px; }
        .fichaje-type-btn { flex: 1; padding: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 12px; transition: all 0.3s; }
        .fichaje-type-btn.active { background: #4a3b4d; color: white; }
        .fichaje-type-btn.inactive { background: #f1f5f9; color: #94a3b8; }
    </style>
</head>
<body class="pb-20">

    <div id="confirm-modal">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl text-center" onclick="event.stopPropagation()">
            <h3 id="confirm-title" class="oswald text-2xl font-bold uppercase text-gray-800 mb-2">¿Estás seguro?</h3>
            <p id="confirm-message" class="text-gray-600 text-sm mb-6 leading-tight">Esta acción no se puede deshacer.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 font-black rounded-xl uppercase text-[10px] transition-all">Cancelar</button>
                <button id="confirm-execute-btn" class="flex-1 py-3 bg-red-500 text-white font-black rounded-xl uppercase text-[10px] shadow-lg">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="create-match-modal">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl relative" onclick="event.stopPropagation()">
            <h3 class="oswald text-2xl font-black text-gray-800 uppercase mb-6 text-center tracking-tight">Programar Partido</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-pink-500 mb-1 ml-1">Equipo Local</label>
                    <select id="equipoL" class="w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-100 font-bold text-gray-700 text-sm outline-none focus:ring-2 focus:ring-pink-300 transition-all"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-pink-500 mb-1 ml-1">Equipo Visitante</label>
                    <select id="equipoV" class="w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-100 font-bold text-gray-700 text-sm outline-none focus:ring-2 focus:ring-pink-300 transition-all"></select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="cerrarNuevoPartido()" class="flex-1 py-4 bg-gray-100 text-gray-400 font-black rounded-2xl uppercase text-[10px] tracking-widest transition-all">Cerrar</button>
                    <button onclick="agregarCruceAlFixture()" class="flex-1 py-4 bg-pink-600 text-white font-black rounded-2xl uppercase text-[10px] tracking-widest shadow-lg">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="match-detail-modal">
        <div class="bg-white rounded-[2.5rem] p-6 max-w-md w-full shadow-2xl relative max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
            <button onclick="cerrarDetallePartido()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-600 transition-colors">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <div class="text-center mb-8">
                <span id="modal-match-fecha" class="text-[10px] font-black text-pink-500 uppercase tracking-widest bg-pink-50 px-3 py-1 rounded-full">Fecha 1</span>
                <div class="flex items-center justify-between mt-6 gap-2">
                    <div class="flex flex-col items-center flex-1">
                        <div id="modal-match-logo-l" class="w-16 h-16 bg-white rounded-full p-1 shadow-md border border-gray-100 mb-2"></div>
                        <span id="modal-match-nombre-l" class="oswald text-sm font-black uppercase text-gray-800 text-center leading-tight line-clamp-2">Local</span>
                    </div>
                    <span class="oswald text-2xl font-black text-gray-200 uppercase">VS</span>
                    <div class="flex flex-col items-center flex-1">
                        <div id="modal-match-logo-v" class="w-16 h-16 bg-white rounded-full p-1 shadow-md border border-gray-100 mb-2"></div>
                        <span id="modal-match-nombre-v" class="oswald text-sm font-black uppercase text-gray-800 text-center leading-tight line-clamp-2">Visitante</span>
                    </div>
                </div>
            </div>
            <div id="contenedor-inputs-categorias" class="space-y-4"></div>
            <button onclick="guardarResultadosPartidoActual()" class="w-full mt-8 py-4 bg-gradient-to-r from-pink-600 to-pink-800 text-white font-black uppercase rounded-2xl shadow-xl text-xs tracking-widest">Guardar Resultados</button>
        </div>
    </div>

    <div id="modal-container" onclick="cerrarCarnet()">
        <div class="p-2 relative" onclick="event.stopPropagation()">
            <button onclick="cerrarCarnet()" class="absolute -top-12 right-0 text-white font-bold text-4xl bg-black/40 w-12 h-12 rounded-full flex items-center justify-center">×</button>
            <div id="id-card-render"></div>
            <button onclick="cerrarCarnet()" class="w-full mt-6 py-4 bg-white text-pink-600 font-black rounded-2xl uppercase text-sm shadow-2xl transition-all">Cerrar Credencial</button>
        </div>
    </div>

    <div id="dni-modal-container" onclick="cerrarDniModal()">
        <div class="p-4 bg-white rounded-3xl max-w-[90vw] w-full" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 text-left">
                <h3 class="oswald text-xl font-bold uppercase text-gray-800 tracking-tight leading-none">Visor de Documento</h3>
                <button onclick="cerrarDniModal()" class="text-gray-400 font-black text-2xl leading-none">×</button>
            </div>
            <div id="dni-image-render" class="w-full h-auto min-h-[200px] bg-gray-100 rounded-xl overflow-hidden flex items-center justify-center border-2 border-dashed border-gray-200"></div>
            <button onclick="cerrarDniModal()" class="w-full mt-6 py-4 bg-[#4a3b4d] text-white font-black rounded-2xl uppercase text-sm shadow-lg transition-all">Cerrar Visor</button>
        </div>
    </div>

    <div id="status-message" class="fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold text-sm shadow-2xl z-[100] hidden text-white transition-all"></div>

    <header id="inicio" class="pt-10 pb-6 px-6 text-center relative text-white">
        <div class="flex justify-between items-center max-w-md mx-auto leading-none">
            <img src="LOGO.LIGADELASNENAS.jpeg" alt="Logo" class="w-16 h-16 bg-white rounded-full p-1 shadow-lg object-contain border-2 border-pink-300" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
            <h1 class="oswald text-4xl font-black uppercase leading-none header-text tracking-tighter text-center">LA LIGA DE LAS<br>NENAS</h1>
            <img src="LOGO.LIGADELASNENAS.jpeg" alt="Logo" class="w-16 h-16 bg-white rounded-full p-1 shadow-lg object-contain border-2 border-pink-300" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 text-center">
        <div class="grid grid-cols-4 gap-2 mb-8 leading-none">
            <button onclick="switchView('posiciones', this)" class="tab-btn active rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Tablas</span>
            </button>
            <button onclick="switchView('fechas', this)" class="tab-btn rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="m13 19 2 2 5-5-2-2"/><path d="M8.5 22.5 12 19l-7-7-3.5 3.5Z"/><path d="m18 13 3 3"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Fixture</span>
            </button>
            <button onclick="switchView('equipos', this)" class="tab-btn rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm text-center">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Equipos</span>
            </button>
            <button onclick="switchView('fichar', this)" class="tab-btn rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Fichar</span>
            </button>
        </div>

        <section id="vista-posiciones" class="view-section active">
            <div class="flex gap-2 mb-8 overflow-x-auto pb-4 no-scrollbar sticky top-2 z-20">
                <button onclick="irACategoria('cat-general', this)" class="cat-btn category-btn-active px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">General</button>
                <button onclick="irACategoria('cat-201112', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2011/12</button>
                <button onclick="irACategoria('cat-201314', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2013/14</button>
                <button onclick="irACategoria('cat-201516', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2015/16</button>
                <button onclick="irACategoria('cat-201718', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2017/18</button>
                <button onclick="irACategoria('cat-201920', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2019/20</button>
            </div>
            <div id="tablas-dinamicas" class="space-y-12 text-left"></div>
        </section>

        <section id="vista-fechas" class="view-section leading-none">
            <h2 class="oswald text-3xl font-bold uppercase mb-6 text-[#2d1b2e] tracking-tight">Fixture y Resultados</h2>
            <div class="flex items-center gap-3 overflow-x-auto pb-4 no-scrollbar mb-6" id="contenedor-pestañas-fechas"></div>
            <div class="flex items-center justify-between mb-8 px-1">
                <button onclick="abrirEstadisticasFecha()" class="bg-yellow-300 text-[9px] font-black text-yellow-900 px-4 py-2.5 rounded-full shadow-sm uppercase tracking-tight">Estadísticas</button>
                <div class="flex gap-2">
                    <button onclick="abrirNuevoPartido()" class="bg-red-600 text-white flex items-center gap-1.5 px-4 py-2.5 rounded-full shadow-md text-[9px] font-black uppercase">+ Partido</button>
                    <button onclick="eliminarJornadaActual()" class="text-gray-400 p-2">🗑️</button>
                </div>
            </div>
            <div id="contenedor-jornadas-historial" class="space-y-4 text-left min-h-[200px]"></div>
        </section>

        <section id="vista-equipos" class="view-section leading-none">
            <div id="subvista-equipos-lista" class="sub-view active">
                <h2 class="oswald text-3xl font-bold uppercase mb-6 text-[#2d1b2e]">Clubes Registrados</h2>
                <div class="bg-white/40 p-6 rounded-3xl shadow-lg border border-white/30 mb-10 text-center">
                    <div class="flex flex-col items-center mb-6">
                        <div class="relative group">
                            <div id="club-logo-preview-container" class="w-24 h-24 bg-white/80 rounded-full border-2 border-dashed border-pink-400 flex items-center justify-center overflow-hidden p-1"><svg id="club-placeholder-logo" width="30" height="30" fill="#ff7bc1" viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0z"/></svg><img id="club-logo-preview" class="hidden w-full h-full object-contain"></div>
                            <input type="file" id="input-logo-club" accept="image/*" class="hidden" onchange="previewLogoClub(event)">
                            <button onclick="document.getElementById('input-logo-club').click()" class="absolute -bottom-1 -right-1 bg-pink-600 text-white p-2 rounded-full border-2 border-white shadow-lg leading-none">+</button>
                        </div>
                        <span class="text-[9px] font-black text-pink-700 mt-2 uppercase tracking-widest">Escudo</span>
                    </div>
                    <input type="text" id="nombreEquipo" placeholder="NOMBRE DEL CLUB" class="w-full px-4 py-4 rounded-xl bg-white border-none font-black text-center text-gray-700 uppercase tracking-widest shadow-inner outline-none mb-4">
                    <button onclick="agregarEquipo()" class="w-full py-4 bg-gradient-to-r from-[#e6338a] to-[#c2185b] text-white font-black uppercase rounded-xl shadow-md">Agregar Equipo</button>
                </div>
                <div id="lista-clubes-botones" class="grid grid-cols-1 gap-4 text-left"></div>
            </div>
            <div id="subvista-club-detalle" class="sub-view text-left">
                <button onclick="mostrarSubvista('subvista-equipos-lista')" class="flex items-center gap-1 text-pink-700 font-black mb-6 uppercase text-[11px] bg-white/50 px-4 py-2 rounded-full">Volver</button>
                <div class="bg-[#4a3b4d] rounded-3xl p-6 text-white mb-8 flex justify-between items-center shadow-xl border-b-4 border-pink-500">
                    <div class="flex items-center gap-3"><div id="detalle-club-escudo" class="w-14 h-14 bg-white rounded-full p-1 overflow-hidden"></div><h2 id="detalle-club-nombre" class="oswald text-3xl font-black uppercase tracking-widest leading-none">---</h2></div>
                    <button onclick="borrarClubAction(clubActualId)" class="bg-red-500 text-white p-3 rounded-xl shadow-lg">🗑️</button>
                </div>
                <div id="lista-categorias-botones" class="grid grid-cols-1 gap-3"></div>
            </div>
            <div id="subvista-plantel-detalle" class="sub-view text-left">
                <button onclick="mostrarSubvista('subvista-club-detalle')" class="flex items-center gap-1 text-pink-700 font-black mb-6 uppercase text-[11px] bg-white/50 px-4 py-2 rounded-full">Volver</button>
                <div class="bg-white rounded-3xl p-5 border-b-8 border-pink-500 mb-8 shadow-xl text-center">
                    <h2 id="plantel-club-nombre" class="oswald text-xl text-gray-400 uppercase font-bold">---</h2>
                    <h3 id="plantel-categoria-nombre" class="oswald text-4xl font-black text-pink-600 uppercase mt-1">---</h3>
                </div>
                <div class="flex border-b border-gray-200 mb-6 px-2">
                    <button onclick="cambiarSeccionPlantel('jugadoras')" id="tab-plantel-jugadoras" class="category-tab active flex-1 text-center">Plantel</button>
                    <button onclick="cambiarSeccionPlantel('partidos')" id="tab-plantel-partidos" class="category-tab flex-1 text-center">Partidos</button>
                </div>
                <div id="contenedor-jugadoras-fichadas" class="space-y-3"></div>
                <div id="contenedor-partidos-equipo" class="space-y-4 hidden"></div>
            </div>
        </section>

        <section id="vista-fichar" class="view-section leading-none">
            <h2 class="oswald text-3xl font-bold uppercase mb-6 text-[#2d1b2e] tracking-tight">Fichaje Oficial</h2>
            <div class="bg-white/40 p-6 rounded-3xl shadow-lg border border-white/30 mb-10 text-center">
                <div class="flex bg-gray-100 p-1 rounded-2xl mb-8 gap-1">
                    <button onclick="setTipoFichaje('jugadora')" id="btn-type-jugadora" class="fichaje-type-btn active">Jugadora</button>
                    <button onclick="setTipoFichaje('delegado')" id="btn-type-delegado" class="fichaje-type-btn inactive">Delegado</button>
                </div>
                <div class="flex justify-center gap-8 mb-8">
                    <div class="flex flex-col items-center">
                        <div class="relative">
                            <div id="photo-preview-container" class="w-24 h-32 bg-white/80 rounded-xl border-2 border-dashed border-pink-400 flex items-center justify-center overflow-hidden shadow-inner"><img id="image-preview" class="hidden w-full h-full object-cover"><span id="placeholder-icon">Rostro</span></div>
                            <input type="file" id="input-foto" accept="image/*" class="hidden" onchange="previewFoto(event, 'perfil')">
                            <button onclick="document.getElementById('input-foto').click()" class="absolute -bottom-2 -right-2 bg-pink-600 text-white p-2 rounded-full border-2 border-white shadow-lg">+</button>
                        </div>
                    </div>
                    <div id="fichaje-dni-photo-container" class="flex flex-col items-center">
                        <div class="relative">
                            <div id="dni-preview-container" class="w-24 h-32 bg-white/80 rounded-xl border-2 border-dashed border-pink-400 flex items-center justify-center overflow-hidden shadow-inner"><img id="dni-image-preview" class="hidden w-full h-full object-cover"><span>DNI</span></div>
                            <input type="file" id="input-foto-dni" accept="image/*" class="hidden" onchange="previewFoto(event, 'dni')">
                            <button onclick="document.getElementById('input-foto-dni').click()" class="absolute -bottom-2 -right-2 bg-[#4a3b4d] text-white p-2 rounded-full border-2 border-white shadow-lg">+</button>
                        </div>
                    </div>
                </div>
                <button onclick="ejecutarVerificacionDefinitiva()" class="w-full mb-6 py-3 bg-indigo-600 text-white font-black uppercase rounded-xl text-[10px] shadow-md">Verificar con IA</button>
                <div id="ia-result-box" class="hidden p-3 rounded-xl mb-4 text-[10px] font-bold border"></div>
                <div class="space-y-4 text-left">
                    <div class="grid grid-cols-2 gap-3">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {

        // Subida optimizada
        async function subirAInternet(base64) {
            if (!base64) return null;
            const body = new FormData();
            body.append("image", base64.split(",")[1]);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: body });
                const json = await res.json();
                return json.success ? json.data.url : null;
            } catch (e) { return null; }
        }

        // Sincronización Inicial
        onValue(ref(db, 'liga'), (snap) => {

            window.partidos = d.partidos ? Object.values(d.partidos) : [];
            window.jugadoras = d.jugadoras ? Object.values(d.jugadoras) : [];
            window.identidadesVerificadas = d.identidades || {};
            window.totalJornadas = d.totalJornadas || 1;
            
            // Forzar actualización del selector de clubes para fichar
            actualizarSelectsEquipos();
            actualizarTodo();
        });

        window.agregarEquipo = async function() {
            const n = document.getElementById('nombreEquipo').value.trim();
            if (!n) return;
            showStatus("Subiendo escudo...");
            const url = await subirAInternet(window.logoClubTemporal);
            const r = push(ref(db, 'liga/equipos'));
            set(r, { id: Date.now(), nombre: n.toUpperCase(), logo: url || 'LOGO.LIGADELASNENAS.jpeg' });
            document.getElementById('nombreEquipo').value = ""; window.resetFormLogo();
            showStatus("¡Equipo guardado!");

        window.ficharPersona = async function() {
            const ape = document.getElementById('apellidoJugadora').value.trim();
            const nom = document.getElementById('nombreJugadora').value.trim();
            const d = document.getElementById('dniJugadora').value.trim();
            const clId = document.getElementById('clubJugadora').value;
            if (!ape || !nom || !clId || !d) return showStatus("Faltan datos", true);
            
            showStatus("Subiendo fotos... espera");
            const urlP = await subirAInternet(window.fotoTemporal);
            const urlD = await subirAInternet(window.fotoDniTemporal);

            let p = { id: Date.now(), nombre: `${ape} ${nom}`.toUpperCase(), dni: d, clubId: parseInt(clId), tipo: window.tipoFichajeActual, foto: urlP, fotoDni: urlD };
            if (window.tipoFichajeActual === 'jugadora') {
                const fn = document.getElementById('fechaNacimientoJugadora').value;
                p.fechaNac = fn; p.cat = calcularCategoria(fn);
            }
            set(push(ref(db, 'liga/jugadoras')), p);
            if(window.identidadesVerificadas[d]) set(ref(db, `liga/identidades/${d}`), window.identidadesVerificadas[d]);
            showStatus("¡Fichaje exitoso!");
            document.getElementById('apellidoJugadora').value = ""; document.getElementById('nombreJugadora').value = ""; document.getElementById('dniJugadora').value = "";
            window.resetFormFoto();
        };

        window.borrarClubAction = (id) => { openConfirmModal("Borrar Club", "¿Seguro?", () => { onValue(ref(db, 'liga/equipos'), (s) => { s.forEach(c => { if(c.val().id == id) remove(ref(db, `liga/equipos/${c.key}`)); }); }, {onlyOnce:true}); }); };
        window.borrarJugadoraAction = (id) => { openConfirmModal("Borrar Persona", "¿Seguro?", () => { onValue(ref(db, 'liga/jugadoras'), (s) => { s.forEach(c => { if(c.val().id == id) remove(ref(db, `liga/jugadoras/${c.key}`)); }); }, {onlyOnce:true}); }); };
        window.agregarCruceAlFixture = () => { const l = parseInt(document.getElementById('equipoL').value), v = parseInt(document.getElementById('equipoV').value); if(!l || !v || l==v) return; set(push(ref(db, 'liga/partidos')), { id: Date.now(), jornada: window.jornadaActualNum, lId: l, vId: v, resultados: {} }); cerrarNuevoPartido(); };
        window.guardarResultadosPartidoActual = () => { if(!window.partidoEditandoId) return; let res = {}; window.categorias.forEach(cat => { const s = cat.replace('/','-'); const gL = document.getElementById(`valL-${s}`).value, gV = document.getElementById(`valV-${s}`).value; const nL = document.getElementById(`npL-${s}`).checked, nV = document.getElementById(`npV-${s}`).checked; if(gL!==""||gV!==""||nL||nV) res[cat] = { gL:parseInt(gL)||0, gV:parseInt(gV)||0, npL:nL, npV:nV }; }); onValue(ref(db, 'liga/partidos'), (s) => { s.forEach(c => { if(c.val().id == window.partidoEditandoId) update(ref(db, `liga/partidos/${c.key}`), { resultados: res }); }); }, {onlyOnce:true}); cerrarDetallePartido(); };
        window.eliminarCruce = (id) => { onValue(ref(db, 'liga/partidos'), (s) => { s.forEach(c => { if(c.val().id == id) remove(ref(db, `liga/partidos/${c.key}`)); }); }, {onlyOnce:true}); };
        window.agregarNuevaJornada = () => { window.totalJornadas++; set(ref(db, 'liga/totalJornadas'), window.totalJornadas); seleccionarJornada(window.totalJornadas); };
    </script>

    <script>
        const apiKey = "AIzaSyB1Z0ynU3gi9psilI-nF4T9t4b4l7U1O7Q";
        let fotoTemporal = null, fotoDniTemporal = null, logoClubTemporal = null;
        let clubActualId = null, categoriaActual = null, partidoEditandoId = null;

        function showStatus(msg, isError = false) { 
            const el = document.getElementById('status-message'); 
            el.innerText = msg; el.style.backgroundColor = isError ? '#ef4444' : '#10b981'; 
            el.classList.remove('hidden'); el.style.display = 'block'; 
            setTimeout(() => { el.classList.add('hidden'); el.style.display = 'none'; }, 3000); // Se va solo siempre
        }
        
        function openConfirmModal(t, m, c) { document.getElementById('confirm-title').innerText = t; document.getElementById('confirm-message').innerText = m; document.getElementById('confirm-execute-btn').onclick = () => { c(); closeConfirmModal(); }; document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function cerrarCarnet() { document.getElementById('modal-container').style.display = 'none'; }
        function cerrarDniModal() { document.getElementById('dni-modal-container').style.display = 'none'; }
        function cerrarDetallePartido() { document.getElementById('match-detail-modal').style.display = 'none'; }

        function seleccionarJornada(n) { jornadaActualNum = n; renderPestañasFechas(); renderJornadasAgrupadas(); }

        // IA y Compresión
        async function compressImage(b64, maxWidth = 400) {
            return new Promise((res) => {
                const img = new Image(); img.src = b64;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > maxWidth) { h = Math.round((h * maxWidth) / w); w = maxWidth; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    res(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }

        async function ejecutarVerificacionDefinitiva() {
            const dVal = document.getElementById('dniJugadora').value;
            const resB = document.getElementById('ia-result-box');
            if (!fotoTemporal || !fotoDniTemporal) return showStatus("Sube ambas fotos", true);
            const btn = document.getElementById('btn-verificar-ia');
            btn.disabled = true; btn.innerHTML = "Analizando...";
            try {
                const fD = await compressImage(fotoTemporal); const dD = await compressImage(fotoDniTemporal);
                const p = { contents: [{ parts: [{ text: "Compara estas fotos. ¿Es la misma persona? Responde JSON: {\"match\": boolean, \"reason\": \"string\"}" }, { inlineData: { mimeType: "image/jpeg", data: fD.split(',')[1] } }, { inlineData: { mimeType: "image/jpeg", data: dD.split(',')[1] } }] }] };
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, { method: 'POST', body: JSON.stringify(p) });
                const j = await r.json(); const t = j.candidates[0].content.parts[0].text;
                const data = JSON.parse(t.replace(/```json/gi, '').replace(/```/gi, '').trim());
                resB.classList.remove('hidden');
                resB.className = data.match ? "p-3 rounded-xl mb-4 text-[10px] font-bold bg-green-100 text-green-700" : "p-3 rounded-xl mb-4 text-[10px] font-bold bg-red-100 text-red-700";
                resB.innerHTML = data.match ? `✅ OK: ${data.reason}` : `⚠️ ALERTA: ${data.reason}`;
                identidadesVerificadas[dVal] = { match: data.match };
            } catch (e) { showStatus("Error IA", true); } finally { btn.disabled = false; btn.innerHTML = "Verificar con IA"; }
        }

        // Lógica de Tablas (Original Reconstruida)
        function calcularEstadisticas(cF) {
             let stats = equipos.map(e => ({ id: e.id, nombre: e.nombre, logo: e.logo, pts: 0, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0 }));
             partidos.forEach(p => {
                 categorias.forEach(cat => {
                    if (cF && cF !== cat) return;
                    const r = p.resultados ? p.resultados[cat] : null;
                    if (r && (r.gL !== undefined || r.npL)) {
                        const loc = stats.find(s => s.id == p.lId), vis = stats.find(s => s.id == p.vId);
                        if (!loc || !vis) return;
                        loc.pj++; vis.pj++;
                        let gL = r.npL ? 0 : (r.gL || 0), gV = r.npV ? 0 : (r.gV || 0);
                        if (r.npL && !r.npV) gV = 2; else if (r.npV && !r.npL) gL = 2;
                        loc.gf += gL; loc.gc += gV; vis.gf += gV; vis.gc += gL;
                        if (gL > gV) { loc.g++; loc.pts += 3; vis.p++; } else if (gL < gV) { vis.g++; vis.pts += 3; loc.p++; } else { loc.e++; vis.e++; loc.pts++; vis.pts++; }
                    }
                });
            });
             stats.forEach(s => s.dg = s.gf - s.gc);
             return stats.sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
        }

        function renderTablasStandings() { 
            const c = document.getElementById('tablas-dinamicas'); 
            if(!c) return; 
            c.innerHTML = generarHtmlTabla("cat-general", "Clasificación General", calcularEstadisticas(null)); 
            categorias.forEach(cat => { c.innerHTML += generarHtmlTabla("cat-" + cat.replace('/', ''), `Categoría ${cat}`, calcularEstadisticas(cat)); }); 
        }

        function generarHtmlTabla(id, t, ls) { 
            let f = ls.map((e, i) => `
                <tr class="table-row">
                    <td class="table-cell text-center text-gray-400 w-8 font-black">${i+1}</td>
                    <td class="table-cell px-2">
                        <div class="flex items-center gap-2">
                            <img src="${e.logo || 'LOGO.LIGADELASNENAS.jpeg'}" class="w-5 h-5 rounded-full object-contain bg-white border" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
                            <span class="truncate uppercase oswald tracking-tight text-gray-700" style="max-width: 100px;">${e.nombre}</span>
                        </div>
                    </td>
                    <td class="table-cell text-center pts-cell">${e.pts}</td>
                    <td class="table-cell text-center">${e.pj}</td>
                    <td class="table-cell text-center text-green-500">${e.g}</td>
                    <td class="table-cell text-center text-yellow-500">${e.e}</td>
                    <td class="table-cell text-center text-red-500">${e.p}</td>
                    <td class="table-cell text-center text-[9px] text-gray-400 font-bold">${e.gf}/${e.gc}</td>
                    <td class="table-cell text-center font-black">${e.dg > 0 ? '+' + e.dg : e.dg}</td>
                </tr>`).join(''); 
            return `<div id="${id}" class="mb-10"><div class="flex items-center gap-3 mb-4"><div class="h-8 w-1.5 bg-[#e6338a] rounded-full"></div><h2 class="oswald text-2xl font-black uppercase text-white">${t}</h2></div><div class="table-card"><table class="w-full text-left"><thead><tr class="bg-[#4a3b4d]"><th class="table-header-cell text-center text-white/50">#</th><th class="table-header-cell text-white">Equipo</th><th class="table-header-cell text-center text-white bg-[#e6338a]/20">PTS</th><th class="table-header-cell text-center text-white/70">PJ</th><th class="table-header-cell text-center text-white/70">G</th><th class="table-header-cell text-center text-white/70">E</th><th class="table-header-cell text-center text-white/70">P</th><th class="table-header-cell text-center text-white/70">GF/GC</th><th class="table-header-cell text-center text-white/70">DG</th></tr></thead><tbody>${f}</tbody></table></div></div>`; 
        }

        // Otros Renders
        function renderPestañasFechas() { const c = document.getElementById('contenedor-pestañas-fechas'); if(!c) return; let h = ""; for(let i=1; i <= totalJornadas; i++) h += `<div onclick="seleccionarJornada(${i})" class="date-tab ${jornadaActualNum === i ? 'active' : ''}">${i}° Fecha</div>`; h += `<div onclick="agregarNuevaJornada()" class="date-tab new-date-btn">+ Nueva</div>`; c.innerHTML = h; }
        function renderJornadasAgrupadas() { const c = document.getElementById('contenedor-jornadas-historial'); const f = partidos.filter(p => p.jornada == jornadaActualNum); if(!f.length) { c.innerHTML = "<p class='text-center py-10 text-white font-bold'>No hay partidos</p>"; return; } c.innerHTML = f.map(p => { const l=equipos.find(e=>e.id==p.lId), v=equipos.find(e=>e.id==p.vId); return `<div onclick="abrirDetallePartido(${p.id})" class="bg-white rounded-3xl p-6 mb-3 shadow-md flex items-center justify-between"><div class="flex-1 text-center"><img src="${l?.logo || ''}" class="w-10 h-10 mx-auto mb-1 object-contain"><span class="oswald text-[10px] block truncate">${l?.nombre}</span></div><span class="oswald text-xl text-gray-200 px-4">VS</span><div class="flex-1 text-center"><img src="${v?.logo || ''}" class="w-10 h-10 mx-auto mb-1 object-contain"><span class="oswald text-[10px] block truncate">${v?.nombre}</span></div><button onclick="event.stopPropagation(); eliminarCruce(${p.id})">🗑️</button></div>`; }).join(''); }
        function renderEquiposList() { const c = document.getElementById('lista-clubes-botones'); if(!c) return; c.innerHTML = equipos.map(e => `<div class="bg-white p-4 rounded-3xl mb-2 flex justify-between items-center shadow-sm"><div onclick="verCategoriasClub(${e.id})" class="flex items-center gap-3"><img src="${e.logo || ''}" class="w-10 h-10 object-contain"><span class="oswald font-bold">${e.nombre}</span></div><button onclick="borrarClubAction(${e.id})">🗑️</button></div>`).join(''); }
        function verCategoriasClub(id) { clubActualId = id; const c = equipos.find(e => e.id == id); document.getElementById('detalle-club-nombre').innerText = c.nombre; document.getElementById('detalle-club-escudo').innerHTML = `<img src="${c.logo}" class="w-10 h-10">`; const b = document.getElementById('lista-categorias-botones'); b.innerHTML = categorias.map(cat => `<button onclick="verPlantelDetalle('${cat}')" class="bg-white p-4 rounded-2xl mb-2 w-full flex justify-between font-bold"><span>${cat}</span><span>→</span></button>`).join(''); mostrarSubvista('subvista-club-detalle'); }
        function renderListaFichajes() { const c = document.getElementById('lista-fichajes'); if(!c) return; c.innerHTML = ""; equipos.forEach(eq => { const js = jugadoras.filter(j => j.clubId == eq.id); if(js.length) { let h = `<div class="bg-white rounded-3xl overflow-hidden mb-4"><div class="bg-[#4a3b4d] p-3 text-white text-xs font-bold">${eq.nombre}</div>`; h += js.map(j => `<div class="p-3 flex justify-between items-center border-b last:border-0"><div class="flex items-center gap-2"><img src="${j.foto || ''}" class="w-8 h-8 rounded object-cover"><div class="text-[10px] font-bold"><div>${j.nombre}</div><div class="text-pink-500">${j.cat || 'DEL'}</div></div></div><div class="flex gap-2"><button onclick="verCarnet(${j.id})">🪪</button><button onclick="borrarJugadoraAction(${j.id})">🗑️</button></div></div>`).join(''); c.innerHTML += h + "</div>"; } }); }
        
        // UI Utils
        function setTipoFichaje(t) { tipoFichajeActual = t; document.getElementById('btn-type-jugadora').className = t=='jugadora'?'fichaje-type-btn active':'fichaje-type-btn inactive'; document.getElementById('btn-type-delegado').className = t=='delegado'?'fichaje-type-btn active':'fichaje-type-btn inactive'; document.getElementById('fichaje-dni-photo-container').style.display = t=='delegado'?'none':'flex'; document.getElementById('fechaNacimientoJugadora').style.display = t=='delegado'?'none':'block'; }

        function calcularCategoria(f) { const y = new Date(f + "T00:00:00").getFullYear(); if(y==2011||y==2012) return "2011/12"; if(y==2013||y==2014) return "2013/14"; if(y==2015||y==2016) return "2015/16"; if(y==2017||y==2018) return "2017/18"; if(y==2019||y==2020) return "2019/20"; return null; }

        }

        function cambiarSeccionPlantel(s) { document.getElementById('tab-plantel-jugadoras').classList.toggle('active', s=='jugadoras'); document.getElementById('tab-plantel-partidos').classList.toggle('active', s=='partidos'); document.getElementById('contenedor-jugadoras-fichadas').classList.toggle('hidden', s!='jugadoras'); document.getElementById('contenedor-partidos-equipo').classList.toggle('hidden', s!='partidos'); }
        function verPlantelDetalle(cat) { categoriaActual = cat; const cl = equipos.find(e => e.id == clubActualId); document.getElementById('plantel-club-nombre').innerText = cl.nombre; document.getElementById('plantel-categoria-nombre').innerText = cat; const js = jugadoras.filter(j => j.clubId == clubActualId && j.cat == cat); document.getElementById('contenedor-jugadoras-fichadas').innerHTML = js.map(j => `<div class="bg-white p-3 rounded-2xl mb-2 flex justify-between items-center shadow-sm"><div><b>${j.nombre}</b></div><div class="flex gap-2"><button onclick="verCarnet(${j.id})">🪪</button><button onclick="borrarJugadoraAction(${j.id})">🗑️</button></div></div>`).join(''); mostrarSubvista('subvista-plantel-detalle'); }
        function actualizarTodo() { renderEquiposList(); renderTablasStandings(); renderListaFichajes(); renderPestañasFechas(); renderJornadasAgrupadas(); }
        window.onload = () => { actualizarTodo(); };
    </script>
</body>
</html>
