<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Liga de las Nenas - Oficial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* MANTENGO TUS ESTILOS ORIGINALES */
        body { font-family: 'Roboto', sans-serif; background: linear-gradient(to bottom, #ff7bc1, #ffb3d9, #ffffff); min-height: 100vh; margin: 0; scroll-behavior: smooth; }
        .oswald { font-family: 'Oswald', sans-serif; }
        .header-text { color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .tab-btn { background-color: rgba(255, 255, 255, 0.3); color: #4a3b4d; border: 1px solid rgba(255, 255, 255, 0.2); transition: all 0.3s ease; }
        .tab-btn.active { background: linear-gradient(to bottom, #e6338a, #c2185b); color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); border-color: transparent; }
        .category-tab { border-bottom: 3px solid transparent; color: #94a3b8; font-weight: 900; text-transform: uppercase; font-size: 12px; padding: 10px 0; transition: all 0.3s; }
        .category-tab.active { border-bottom: 3px solid #e6338a; color: #e6338a; }
        .view-section, .sub-view { display: none; }
        .view-section.active, .sub-view.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        #modal-container, #dni-modal-container, #confirm-modal, #match-detail-modal, #create-match-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px; }
        .id-card { width: 330px; height: 210px; background: white; border-radius: 18px; position: relative; overflow: hidden; box-shadow: 0 15px 30px rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.8); margin: auto; }
        .id-card-header { background: linear-gradient(to right, #e6338a, #c2185b); height: 55px; padding: 10px 15px; color: white; display: flex; align-items: center; gap: 10px; }
        .id-card-body { display: flex; padding: 15px; gap: 15px; position: relative; }
        .id-photo { width: 90px; height: 110px; background: #f1f5f9; border: 3px solid #ff7bc1; border-radius: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; z-index: 10; }
        .id-photo img { width: 100%; height: 100%; object-fit: cover; }
        .id-details { flex: 1; z-index: 10; }
        .id-label { font-size: 8px; color: #94a3b8; text-transform: uppercase; font-weight: 900; margin-bottom: -1px; }
        .id-value { font-size: 13px; color: #1e293b; font-weight: 900; text-transform: uppercase; margin-bottom: 5px; line-height: 1.1; }
        .id-footer { position: absolute; bottom: 0; width: 100%; height: 28px; background: #2d1b2e; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #ffb3d9; font-weight: bold; letter-spacing: 1.5px; text-transform: uppercase; }
        .watermark { position: absolute; right: 10px; bottom: 40px; width: 80px; height: 80px; opacity: 0.1; pointer-events: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #e6338a; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #btnVolverArriba { display: none; position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 90; background: linear-gradient(to bottom, #ff4db8, #d63384); color: white; padding: 0.75rem; border-radius: 9999px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); border: 2px solid white; transition: all 0.3s ease; }
        .category-btn-active { background-color: #ff4db8; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-btn-inactive { background-color: rgba(255, 255, 255, 0.3); color: #4a3b4d; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .date-tab { white-space: nowrap; padding: 8px 16px; border-radius: 12px; font-weight: 700; color: #4a3b4d; background: white; border: 2px solid transparent; transition: all 0.2s ease; cursor: pointer; }
        .date-tab.active { background: white; border-color: #ff4db8; color: #ff4db8; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .new-date-btn { background: #e2e8f0; color: #64748b; }
        .table-card { background: white; border-radius: 2rem; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); }
        .table-header-cell { padding: 12px 6px; font-size: 9px; text-transform: uppercase; font-weight: 900; color: #94a3b8; letter-spacing: 0.05em; }
        .table-row { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .table-row:last-child { border-bottom: none; }
        .table-row:nth-child(even) { background-color: #fafafa; }
        .table-cell { padding: 14px 6px; font-size: 11px; font-weight: 700; color: #334155; }
        .pts-cell { background-color: #fff1f8; color: #e6338a; font-weight: 900; font-size: 13px; }
        .fichaje-type-btn { flex: 1; padding: 10px; font-size: 10px; font-weight: 900; text-transform: uppercase; border-radius: 12px; transition: all 0.3s; }
        .fichaje-type-btn.active { background: #4a3b4d; color: white; }
        .fichaje-type-btn.inactive { background: #f1f5f9; color: #94a3b8; }
    </style>
</head>
<body class="pb-20">

    <div id="confirm-modal">
        <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl text-center" onclick="event.stopPropagation()">
            <h3 id="confirm-title" class="oswald text-2xl font-bold uppercase text-gray-800 mb-2">¿Estás seguro?</h3>
            <p id="confirm-message" class="text-gray-600 text-sm mb-6 leading-tight">Esta acción no se puede deshacer.</p>
            <div class="flex gap-3">
                <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-gray-100 text-gray-500 font-black rounded-xl uppercase text-[10px] transition-all">Cancelar</button>
                <button id="confirm-execute-btn" class="flex-1 py-3 bg-red-500 text-white font-black rounded-xl uppercase text-[10px] shadow-lg">Eliminar</button>
            </div>
        </div>
    </div>

    <div id="create-match-modal">
        <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl relative" onclick="event.stopPropagation()">
            <h3 class="oswald text-2xl font-black text-gray-800 uppercase mb-6 text-center tracking-tight">Programar Partido</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-pink-500 mb-1 ml-1">Equipo Local</label>
                    <select id="equipoL" class="w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-100 font-bold text-gray-700 text-sm outline-none focus:ring-2 focus:ring-pink-300 transition-all"></select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-pink-500 mb-1 ml-1">Equipo Visitante</label>
                    <select id="equipoV" class="w-full px-4 py-4 rounded-2xl bg-gray-50 border border-gray-100 font-bold text-gray-700 text-sm outline-none focus:ring-2 focus:ring-pink-300 transition-all"></select>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="cerrarNuevoPartido()" class="flex-1 py-4 bg-gray-100 text-gray-400 font-black rounded-2xl uppercase text-[10px] tracking-widest transition-all">Cerrar</button>
                    <button onclick="agregarCruceAlFixture()" class="flex-1 py-4 bg-pink-600 text-white font-black rounded-2xl uppercase text-[10px] tracking-widest shadow-lg">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="match-detail-modal">
        <div class="bg-white rounded-[2.5rem] p-6 max-w-md w-full shadow-2xl relative max-h-[90vh] overflow-y-auto no-scrollbar" onclick="event.stopPropagation()">
            <button onclick="cerrarDetallePartido()" class="absolute top-6 right-6 text-gray-300 hover:text-gray-600 transition-colors">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
            <div class="text-center mb-8">
                <span id="modal-match-fecha" class="text-[10px] font-black text-pink-500 uppercase tracking-widest bg-pink-50 px-3 py-1 rounded-full">Fecha 1</span>
                <div class="flex items-center justify-between mt-6 gap-2">
                    <div class="flex flex-col items-center flex-1">
                        <div id="modal-match-logo-l" class="w-16 h-16 bg-white rounded-full p-1 shadow-md border border-gray-100 mb-2"></div>
                        <span id="modal-match-nombre-l" class="oswald text-sm font-black uppercase text-gray-800 text-center leading-tight line-clamp-2">Local</span>
                    </div>
                    <span class="oswald text-2xl font-black text-gray-200 uppercase">VS</span>
                    <div class="flex flex-col items-center flex-1">
                        <div id="modal-match-logo-v" class="w-16 h-16 bg-white rounded-full p-1 shadow-md border border-gray-100 mb-2"></div>
                        <span id="modal-match-nombre-v" class="oswald text-sm font-black uppercase text-gray-800 text-center leading-tight line-clamp-2">Visitante</span>
                    </div>
                </div>
            </div>
            <div id="contenedor-inputs-categorias" class="space-y-4"></div>
            <button onclick="guardarResultadosPartidoActual()" class="w-full mt-8 py-4 bg-gradient-to-r from-pink-600 to-pink-800 text-white font-black uppercase rounded-2xl shadow-xl active:scale-95 text-xs tracking-widest">Guardar Resultados</button>
        </div>
    </div>

    <div id="modal-container" onclick="cerrarCarnet()">
        <div class="p-2 relative" onclick="event.stopPropagation()">
            <button onclick="cerrarCarnet()" class="absolute -top-12 right-0 text-white font-bold text-4xl bg-black/40 w-12 h-12 rounded-full flex items-center justify-center">×</button>
            <div id="id-card-render"></div>
            <button onclick="cerrarCarnet()" class="w-full mt-6 py-4 bg-white text-pink-600 font-black rounded-2xl uppercase text-sm shadow-2xl active:scale-95 transition-all">Cerrar Credencial</button>
        </div>
    </div>

    <div id="dni-modal-container" onclick="cerrarDniModal()">
        <div class="p-4 bg-white rounded-3xl max-w-[90vw] w-full" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4 text-left">
                <h3 class="oswald text-xl font-bold uppercase text-gray-800 tracking-tight leading-none">Visor de Documento</h3>
                <button onclick="cerrarDniModal()" class="text-gray-400 font-black text-2xl leading-none">×</button>
            </div>
            <div id="dni-image-render" class="w-full h-auto min-h-[200px] bg-gray-100 rounded-xl overflow-hidden flex items-center justify-center border-2 border-dashed border-gray-200 shadow-inner"></div>
            <button onclick="cerrarDniModal()" class="w-full mt-6 py-4 bg-[#4a3b4d] text-white font-black rounded-2xl uppercase text-sm shadow-lg active:scale-95 transition-all">Cerrar Visor</button>
        </div>
    </div>

    <div id="status-message" class="fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full font-bold text-sm shadow-2xl z-[100] hidden text-white transition-all"></div>

    <header id="inicio" class="pt-10 pb-6 px-6 text-center relative text-white">
        <div class="flex justify-between items-center max-w-md mx-auto leading-none">
            <img src="LOGO.LIGADELASNENAS.jpeg" alt="Logo" class="w-16 h-16 bg-white rounded-full p-1 shadow-lg object-contain border-2 border-pink-300" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
            <h1 class="oswald text-4xl font-black uppercase leading-none header-text tracking-tighter text-center">LA LIGA DE LAS<br>NENAS</h1>
            <img src="LOGO.LIGADELASNENAS.jpeg" alt="Logo" class="w-16 h-16 bg-white rounded-full p-1 shadow-lg object-contain border-2 border-pink-300" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 text-center">
        <div class="grid grid-cols-4 gap-2 mb-8 leading-none">
            <button onclick="switchView('posiciones', this)" class="tab-btn active rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Tablas</span>
            </button>
            <button onclick="switchView('fechas', this)" class="tab-btn rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="m13 19 2 2 5-5-2-2"/><path d="M8.5 22.5 12 19l-7-7-3.5 3.5Z"/><path d="m18 13 3 3"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Fixture y Resultados</span>
            </button>
            <button onclick="switchView('equipos', this)" class="tab-btn rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm text-center">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Equipos</span>
            </button>
            <button onclick="switchView('fichar', this)" class="tab-btn rounded-2xl py-4 flex flex-col items-center justify-center gap-1 shadow-sm">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/></svg>
                <span class="text-[9px] font-bold uppercase leading-tight">Fichar</span>
            </button>
        </div>

        <section id="vista-posiciones" class="view-section active">
            <div class="flex gap-2 mb-8 overflow-x-auto pb-4 no-scrollbar sticky top-2 z-20">
                <button onclick="irACategoria('cat-general', this)" class="cat-btn category-btn-active px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">General</button>
                <button onclick="irACategoria('cat-201112', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2011/12</button>
                <button onclick="irACategoria('cat-201314', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2013/14</button>
                <button onclick="irACategoria('cat-201516', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2015/16</button>
                <button onclick="irACategoria('cat-201718', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2017/18</button>
                <button onclick="irACategoria('cat-201920', this)" class="cat-btn category-btn-inactive px-5 py-2.5 rounded-xl text-[11px] font-black transition-all uppercase whitespace-nowrap">2019/20</button>
            </div>
            <div id="tablas-dinamicas" class="space-y-12 text-left"></div>
        </section>

        <section id="vista-fechas" class="view-section leading-none">
            <h2 class="oswald text-3xl font-bold uppercase mb-6 text-[#2d1b2e] tracking-tight">Fixture y Resultados</h2>
            <div class="flex items-center gap-3 overflow-x-auto pb-4 no-scrollbar mb-6" id="contenedor-pestañas-fechas"></div>
            <div class="flex items-center justify-between mb-8 px-1">
                <button onclick="abrirEstadisticasFecha()" class="bg-yellow-300 text-[9px] font-black text-yellow-900 px-4 py-2.5 rounded-full shadow-sm uppercase tracking-tight">Estadísticas de la fecha</button>
                <div class="flex gap-2">
                    <button onclick="abrirNuevoPartido()" class="bg-red-600 text-white flex items-center gap-1.5 px-4 py-2.5 rounded-full shadow-md text-[9px] font-black uppercase"><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="4" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Partido</button>
                    <button onclick="eliminarJornadaActual()" class="text-gray-400 p-2 hover:text-red-500 transition-colors"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
                </div>
            </div>
            <div id="contenedor-jornadas-historial" class="space-y-4 text-left min-h-[200px]"></div>
        </section>

        <section id="vista-equipos" class="view-section leading-none">
            <div id="subvista-equipos-lista" class="sub-view active">
                <h2 class="oswald text-3xl font-bold uppercase mb-6 text-[#2d1b2e]">Clubes Registrados</h2>
                <div class="bg-white/40 p-6 rounded-3xl shadow-lg border border-white/30 mb-10 text-center">
                    <div class="flex flex-col items-center mb-6">
                        <div class="relative group">
                            <div id="club-logo-preview-container" class="w-24 h-24 bg-white/80 rounded-full border-2 border-dashed border-pink-400 flex items-center justify-center overflow-hidden p-1 shadow-inner"><svg id="club-placeholder-logo" width="30" height="30" fill="#ff7bc1" viewBox="0 0 512 512"><path d="M256 0C114.6 0 0 114.6 0 256s114.6 256 256 256 256-114.6 256-256S397.4 0 256 0z"/></svg><img id="club-logo-preview" class="hidden w-full h-full object-contain"></div>
                            <input type="file" id="input-logo-club" accept="image/*" class="hidden" onchange="previewLogoClub(event)">
                            <button onclick="document.getElementById('input-logo-club').click()" class="absolute -bottom-1 -right-1 bg-pink-600 text-white p-2 rounded-full shadow-lg border-2 border-white"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4"/></svg></button>
                        </div>
                        <span class="text-[9px] font-black text-pink-700 mt-2 uppercase tracking-widest">Subir Escudo</span>
                    </div>
                    <input type="text" id="nombreEquipo" placeholder="NOMBRE DEL CLUB" class="w-full px-4 py-4 rounded-xl bg-white border-none font-black text-center text-gray-700 uppercase tracking-widest shadow-inner outline-none mb-4">
                    <button onclick="agregarEquipo()" class="w-full py-4 bg-gradient-to-r from-[#e6338a] to-[#c2185b] text-white font-black uppercase rounded-xl shadow-md">Agregar Equipo</button>
                </div>
                <div id="lista-clubes-botones" class="grid grid-cols-1 gap-4 text-left"></div>
            </div>

            <div id="subvista-club-detalle" class="sub-view text-left">
                <button onclick="mostrarSubvista('subvista-equipos-lista')" class="flex items-center gap-1 text-pink-700 font-black mb-6 uppercase text-[11px] bg-white/50 px-4 py-2 rounded-full shadow-sm">Volver a Clubes</button>
                <div class="bg-[#4a3b4d] rounded-3xl p-6 text-white mb-8 flex justify-between items-center shadow-xl border-b-4 border-pink-500">
                    <div class="flex items-center gap-3"><div id="detalle-club-escudo" class="w-14 h-14 bg-white rounded-full p-1 overflow-hidden shadow-sm"></div><h2 id="detalle-club-nombre" class="oswald text-3xl font-black uppercase tracking-widest leading-none">---</h2></div>
                    <button onclick="borrarClubAction(clubActualId)" class="bg-red-500 text-white p-3 rounded-xl shadow-lg active:scale-90 transition-all"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
                </div>
                <div id="lista-categorias-botones" class="grid grid-cols-1 gap-3"></div>
            </div>

            <div id="subvista-plantel-detalle" class="sub-view text-left">
                <button onclick="mostrarSubvista('subvista-club-detalle')" class="flex items-center gap-1 text-pink-700 font-black mb-6 uppercase text-[11px] bg-white/50 px-4 py-2 rounded-full shadow-sm">Volver a Categorías</button>
                <div class="bg-white rounded-3xl p-5 border-b-8 border-pink-500 mb-8 shadow-xl text-center">
                    <h2 id="plantel-club-nombre" class="oswald text-xl text-gray-400 uppercase font-bold">---</h2>
                    <h3 id="plantel-categoria-nombre" class="oswald text-4xl font-black text-pink-600 uppercase mt-1">---</h3>
                </div>
                <div class="flex border-b border-gray-200 mb-6 px-2">
                    <button onclick="cambiarSeccionPlantel('jugadoras')" id="tab-plantel-jugadoras" class="category-tab active flex-1 text-center">Plantel</button>
                    <button onclick="cambiarSeccionPlantel('partidos')" id="tab-plantel-partidos" class="category-tab flex-1 text-center">Partidos</button>
                </div>
                <div id="contenedor-jugadoras-fichadas" class="space-y-3"></div>
                <div id="contenedor-partidos-equipo" class="space-y-4 hidden"></div>
            </div>
        </section>

        <section id="vista-fichar" class="view-section leading-none">
            <h2 class="oswald text-3xl font-bold uppercase mb-6 text-[#2d1b2e] tracking-tight">Fichaje Oficial</h2>
            <div class="bg-white/40 p-6 rounded-3xl shadow-lg border border-white/30 mb-10 text-center">
                <div class="flex bg-gray-100 p-1 rounded-2xl mb-8 gap-1">
                    <button onclick="setTipoFichaje('jugadora')" id="btn-type-jugadora" class="fichaje-type-btn active">Jugadora</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        // CONFIGURACIÓN DE TU FIREBASE (COPIADA DE TU MENSAJE)
        const firebaseConfig = {
          apiKey: "AIzaSyB1Z0ynU3gi9psilI-nF4T9t4b4l7U1O7Q",
          authDomain: "liga-de-las-nenas.firebaseapp.com",
          databaseURL: "https://liga-de-las-nenas-default-rtdb.firebaseio.com",
          projectId: "liga-de-las-nenas",
          storageBucket: "liga-de-las-nenas.firebasestorage.app",
          messagingSenderId: "1072749803983",
          appId: "1:1072749803983:web:a1010f57fffb924a01baba",
          measurementId: "G-GZNLGMZYYL"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // VARIABLES GLOBALES (Ahora se llenan desde la BD)
        window.equipos = [];
        window.partidos = [];
        window.jugadoras = [];
        window.identidadesVerificadas = {};
        window.jornadaActualNum = 1;
        window.totalJornadas = 1;
        window.tipoFichajeActual = "jugadora";
        window.categorias = ["2011/12", "2013/14", "2015/16", "2017/18", "2019/20"];

        // --- ESCUCHA DE DATOS EN TIEMPO REAL ---
        onValue(ref(db, 'liga'), (snapshot) => {
            const data = snapshot.val() || {};
            window.equipos = data.equipos ? Object.values(data.equipos) : [];
            window.partidos = data.partidos ? Object.values(data.partidos) : [];
            window.jugadoras = data.jugadoras ? Object.values(data.jugadoras) : [];
            window.identidadesVerificadas = data.identidades || {};
            window.totalJornadas = data.totalJornadas || 1;
            actualizarTodo();
        });

        // --- FUNCIONES QUE ESCRIBEN EN LA NUBE ---
        window.agregarEquipo = function() {
            const n = document.getElementById('nombreEquipo').value.trim();
            if (!n) return;
            const newRef = push(ref(db, 'liga/equipos'));
            set(newRef, { id: Date.now(), nombre: n.toUpperCase(), logo: window.logoClubTemporal || null });
            document.getElementById('nombreEquipo').value = "";
            window.resetFormLogo();
            showStatus("Equipo guardado en la nube");
        };

        window.borrarClubAction = function(id) {
            openConfirmModal("Eliminar Club", "¿Borrar este club?", () => {
                // Buscamos la clave en el objeto original (esto es más avanzado pero Firebase lo requiere)
                onValue(ref(db, 'liga/equipos'), (snap) => {
                    snap.forEach((child) => {
                        if(child.val().id == id) remove(ref(db, `liga/equipos/${child.key}`));
                    });
                }, { onlyOnce: true });
                showStatus("Club eliminado");
            });
        };

        window.ficharPersona = function() {
            const ape = document.getElementById('apellidoJugadora').value.trim();
            const nom = document.getElementById('nombreJugadora').value.trim();
            const d = document.getElementById('dniJugadora').value.trim();
            const clId = document.getElementById('clubJugadora').value;
            if (!ape || !nom || !clId || !d) return showStatus("Faltan datos básicos", true);
            
            let p = { id: Date.now(), nombre: `${ape} ${nom}`.toUpperCase(), dni: d, clubId: parseInt(clId), tipo: window.tipoFichajeActual, foto: window.fotoTemporal || null };
            
            if (window.tipoFichajeActual === 'jugadora') {
                const fn = document.getElementById('fechaNacimientoJugadora').value;
                if (!fn) return showStatus("Falta fecha de nacimiento", true);
                let cat = calcularCategoria(fn);
                if (!cat) return showStatus("Edad fuera de rango", true);
                p.fechaNac = fn; p.cat = cat; p.fotoDni = window.fotoDniTemporal || null;
            }

            const newRef = push(ref(db, 'liga/jugadoras'));
            set(newRef, p);

            // Guardar verificación si existe
            if(window.identidadesVerificadas[d]) {
                set(ref(db, `liga/identidades/${d}`), window.identidadesVerificadas[d]);
            }

            showStatus("Fichaje exitoso");
            document.getElementById('apellidoJugadora').value = ""; document.getElementById('nombreJugadora').value = ""; document.getElementById('dniJugadora').value = "";
            window.resetFormFoto();
        };

        window.agregarCruceAlFixture = function() {
            const elL = document.getElementById('equipoL'), elV = document.getElementById('equipoV');
            const lId = parseInt(elL.value), vId = parseInt(elV.value);
            if (!lId || !vId || lId === vId) return;
            const newRef = push(ref(db, 'liga/partidos'));
            set(newRef, { id: Date.now(), jornada: window.jornadaActualNum, lId: lId, vId: vId, resultados: {} });
            cerrarNuevoPartido();
        };

        window.guardarResultadosPartidoActual = function() {
            if (!window.partidoEditandoId) return;
            let resultadosNuevos = {};
            window.categorias.forEach(cat => {
                const safeCat = cat.replace('/', '-');
                const gL = document.getElementById(`valL-${safeCat}`).value, gV = document.getElementById(`valV-${safeCat}`).value;
                const npL = document.getElementById(`npL-${safeCat}`).checked, npV = document.getElementById(`npV-${safeCat}`).checked;
                if (gL !== "" || gV !== "" || npL || npV) { 
                    resultadosNuevos[cat] = { gL: gL !== "" ? parseInt(gL) : 0, gV: gV !== "" ? parseInt(gV) : 0, npL: npL, npV: npV }; 
                }
            });

            // Buscar el partido en la BD y actualizarlo
            onValue(ref(db, 'liga/partidos'), (snap) => {
                snap.forEach((child) => {
                    if(child.val().id == window.partidoEditandoId) {
                        update(ref(db, `liga/partidos/${child.key}`), { resultados: resultadosNuevos });
                    }
                });
            }, { onlyOnce: true });
            cerrarDetallePartido();
        };
        
        window.borrarJugadoraAction = function(id) {
            openConfirmModal("Eliminar Persona", "¿Borrar esta ficha?", () => {
                onValue(ref(db, 'liga/jugadoras'), (snap) => {
                    snap.forEach((child) => {
                        if(child.val().id == id) remove(ref(db, `liga/jugadoras/${child.key}`));
                    });
                }, { onlyOnce: true });
            });
        };

        window.eliminarCruce = function(id) {
            openConfirmModal("Eliminar Cruce", "¿Borrar este partido?", () => {
                onValue(ref(ref(db, 'liga/partidos')), (snap) => {
                    snap.forEach((child) => {
                        if(child.val().id == id) remove(ref(db, `liga/partidos/${child.key}`));
                    });
                }, { onlyOnce: true });
            });
        };

        window.agregarNuevaJornada = function() {
            window.totalJornadas++;
            set(ref(db, 'liga/totalJornadas'), window.totalJornadas);
            window.seleccionarJornada(window.totalJornadas);
        };
        
        window.eliminarJornadaActual = function() {
            if (window.totalJornadas <= 1) return;
            openConfirmModal("Eliminar Fecha", "¿Borrar toda la fecha actual?", () => {
                // Borrar partidos de esta jornada
                onValue(ref(db, 'liga/partidos'), (snap) => {
                    snap.forEach((child) => {
                        if(child.val().jornada == window.jornadaActualNum) remove(ref(db, `liga/partidos/${child.key}`));
                    });
                }, { onlyOnce: true });
                window.totalJornadas--;
                set(ref(db, 'liga/totalJornadas'), window.totalJornadas);
                window.seleccionarJornada(1);
            });
        };

    </script>

    <script>
        const apiKey = "AIzaSyB1Z0ynU3gi9psilI-nF4T9t4b4l7U1O7Q"; // Tu API de Gemini
        let fotoTemporal = null, fotoDniTemporal = null, logoClubTemporal = null;
        let clubActualId = null, categoriaActual = null, partidoEditandoId = null;

        function showStatus(msg, isError = false) {
            const el = document.getElementById('status-message');
            el.innerText = msg; el.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            el.classList.remove('hidden'); el.style.display = 'block';
            setTimeout(() => { el.classList.add('hidden'); el.style.display = 'none'; }, 3000);
        }

        function openConfirmModal(title, message, callback) { document.getElementById('confirm-title').innerText = title; document.getElementById('confirm-message').innerText = message; document.getElementById('confirm-execute-btn').onclick = () => { callback(); closeConfirmModal(); }; document.getElementById('confirm-modal').style.display = 'flex'; }
        function closeConfirmModal() { document.getElementById('confirm-modal').style.display = 'none'; }
        function cerrarCarnet() { document.getElementById('modal-container').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function cerrarDniModal() { document.getElementById('dni-modal-container').style.display = 'none'; }
        function cerrarDetallePartido() { document.getElementById('match-detail-modal').style.display = 'none'; document.body.style.overflow = 'auto'; partidoEditandoId = null; }
        function abrirNuevoPartido() { actualizarSelectsEquipos(); document.getElementById('create-match-modal').style.display = 'flex'; }
        function cerrarNuevoPartido() { document.getElementById('create-match-modal').style.display = 'none'; }
        function abrirEstadisticasFecha() { showStatus("Estadísticas de la Fecha " + jornadaActualNum); }

        async function compressImage(base64Str, maxWidth = 300) {
            return new Promise((resolve) => {
                const img = new Image(); img.src = base64Str;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width, height = img.height;
                    if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            });
        }

        async function ejecutarVerificacionDefinitiva() {
            const dniVal = document.getElementById('dniJugadora').value;
            const resB = document.getElementById('ia-result-box');
            if (!fotoTemporal || !fotoDniTemporal) { showStatus("Sube ambas fotos.", true); return; }
            const btn = document.getElementById('btn-verificar-ia');
            btn.disabled = true; btn.innerHTML = `<span class="loader"></span> Analizando...`;
            try {
                const faceData = await compressImage(fotoTemporal);
                const dniData = await compressImage(fotoDniTemporal);
                const prompt = "Compara estas fotos. ¿Es la misma persona? Responde en JSON: {\"match\": boolean, \"reason\": \"explicación\"}";
                const payload = { contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/jpeg", data: faceData.split(',')[1] } }, { inlineData: { mimeType: "image/jpeg", data: dniData.split(',')[1] } }] }] };
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const result = await res.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                const data = JSON.parse(text.replace(/```json/gi, '').replace(/```/gi, '').trim());
                resB.classList.remove('hidden');
                if (data.match) { resB.className = "p-3 rounded-xl mb-4 text-[10px] font-bold bg-green-100 text-green-700 border border-green-200"; resB.innerHTML = `✅ CONFIRMADA: ${data.reason}`; identidadesVerificadas[dniVal] = { match: true }; }
                else { resB.className = "p-3 rounded-xl mb-4 text-[10px] font-bold bg-red-100 text-red-700 border border-red-200"; resB.innerHTML = `⚠️ ALERTA: ${data.reason}`; identidadesVerificadas[dniVal] = { match: false }; }
            } catch (err) { resB.classList.remove('hidden'); resB.className = "p-3 rounded-xl mb-4 text-[10px] font-bold bg-red-50 text-red-600 border border-red-200"; resB.innerHTML = "❌ Error de conexión."; }
            finally { btn.disabled = false; btn.innerHTML = "Verificar Identidad con IA"; }
        }

        function calcularEstadisticas(cF) {
             let stats = equipos.map(e => ({ id: e.id, nombre: e.nombre, logo: e.logo, pts: 0, pj: 0, g: 0, e: 0, p: 0, gf: 0, gc: 0, dg: 0 }));
             partidos.forEach(p => {
                 categorias.forEach(cat => {
                    if (cF && cF !== cat) return;
                    const r = p.resultados ? p.resultados[cat] : null;
                    if (r && (r.gL !== undefined || r.npL)) {
                        const loc = stats.find(s => s.id == p.lId), vis = stats.find(s => s.id == p.vId);
                        if (!loc || !vis) return;
                        loc.pj++; vis.pj++;
                        let gL = r.npL ? 0 : (r.gL || 0), gV = r.npV ? 0 : (r.gV || 0);
                        if (r.npL && !r.npV) gV = 2; else if (r.npV && !r.npL) gL = 2;
                        loc.gf += gL; loc.gc += gV; vis.gf += gV; vis.gc += gL;
                        if (gL > gV) { loc.g++; loc.pts += 3; vis.p++; } else if (gL < gV) { vis.g++; vis.pts += 3; loc.p++; } else { loc.e++; vis.e++; loc.pts++; vis.pts++; }
                    }
                });
            });
             stats.forEach(s => s.dg = s.gf - s.gc);
             return stats.sort((a, b) => b.pts - a.pts || b.dg - a.dg || b.gf - a.gf);
        }

        function calcularCategoria(fecha) {
            if (!fecha) return null;
            const año = new Date(fecha + "T00:00:00").getFullYear();
            if (año === 2011 || año === 2012) return "2011/12";
            if (año === 2013 || año === 2014) return "2013/14";
            if (año === 2015 || año === 2016) return "2015/16";
            if (año === 2017 || año === 2018) return "2017/18";
            if (año === 2019 || año === 2020) return "2019/20";
            return null;
        }

        function seleccionarJornada(n) { jornadaActualNum = n; renderPestañasFechas(); renderJornadasAgrupadas(); }

        function renderPestañasFechas() {
            const cont = document.getElementById('contenedor-pestañas-fechas');
            if(!cont) return;
            let html = "";
            for(let i=1; i <= totalJornadas; i++) html += `<div onclick="seleccionarJornada(${i})" class="date-tab ${jornadaActualNum === i ? 'active' : ''}">${i}° Fecha</div>`;
            html += `<div onclick="agregarNuevaJornada()" class="date-tab new-date-btn">+ Nueva Fecha</div>`;
            cont.innerHTML = html;
        }

        function renderJornadasAgrupadas() {
            const c = document.getElementById('contenedor-jornadas-historial');
            if (!c) return;
            const filtrados = partidos.filter(p => p.jornada == jornadaActualNum);
            if (filtrados.length === 0) {
                c.innerHTML = `<div class="flex flex-col items-center justify-center py-12 text-gray-400 bg-white/40 rounded-[2rem] border-2 border-dashed border-white/50"><p class="text-sm font-medium uppercase oswald tracking-widest text-center px-4">No hay partidos para esta fecha</p></div>`;
                return;
            }
            c.innerHTML = filtrados.map(p => {
                const loc = equipos.find(e => e.id == p.lId), vis = equipos.find(e => e.id == p.vId);
                let completados = 0;
                categorias.forEach(cat => { if (p.resultados && p.resultados[cat] && (p.resultados[cat].gL !== undefined || p.resultados[cat].npL)) completados++; });
                return `<div onclick="abrirDetallePartido(${p.id})" class="bg-white rounded-[2rem] p-6 shadow-lg border border-white active:scale-[0.98] transition-all cursor-pointer group"><div class="flex justify-between items-center mb-4"><span class="text-[8px] font-black text-gray-300 uppercase tracking-widest">Enfrentamiento</span><span class="text-[8px] font-black px-3 py-1 rounded-full ${completados === 5 ? 'bg-green-100 text-green-600' : 'bg-pink-50 text-pink-600'} uppercase">${completados}/5 Categorías</span></div><div class="flex items-center justify-between gap-2"><div class="flex flex-col items-center flex-1 text-center"><img src="${loc?.logo || 'LOGO.LIGADELASNENAS.jpeg'}" class="w-12 h-12 rounded-full bg-white object-contain mb-2 shadow-sm border border-pink-50" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'"><span class="oswald text-xs font-black uppercase text-gray-800 line-clamp-1">${loc?.nombre || '---'}</span></div><div class="flex flex-col items-center px-4"><span class="oswald text-2xl font-black text-gray-100 uppercase">VS</span></div><div class="flex flex-col items-center flex-1 text-center"><img src="${vis?.logo || 'LOGO.LIGADELASNENAS.jpeg'}" class="w-12 h-12 rounded-full bg-white object-contain mb-2 shadow-sm border border-pink-50" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'"><span class="oswald text-xs font-black uppercase text-gray-800 line-clamp-1">${vis?.nombre || '---'}</span></div></div><div class="mt-5 pt-4 border-t border-gray-50 flex justify-end"><button onclick="event.stopPropagation(); eliminarCruce(${p.id})" class="text-gray-300 hover:text-red-500 transition-colors">🗑️</button></div></div>`;
            }).join('');
        }

        function renderTablasStandings() {
            const container = document.getElementById('tablas-dinamicas');
            if (!container) return;
            container.innerHTML = generarHtmlTabla("cat-general", "Clasificación General", calcularEstadisticas(null));
            categorias.forEach(cat => { container.innerHTML += generarHtmlTabla("cat-" + cat.replace('/', ''), `Categoría ${cat}`, calcularEstadisticas(cat)); });
        }

        function generarHtmlTabla(id, t, ls) {
            let filas = ls.length === 0 ? `<tr><td colspan="9" class="py-10 text-gray-300 italic text-center font-bold text-[9px] uppercase">Sin datos registrados</td></tr>` : ls.map((e, index) => `
                <tr class="table-row">
                    <td class="table-cell text-center text-gray-400 w-8">${index + 1}</td>
                    <td class="table-cell px-2">
                        <div class="flex items-center gap-2">
                            <img src="${e.logo || 'LOGO.LIGADELASNENAS.jpeg'}" class="w-5 h-5 rounded-full object-contain bg-white border shadow-xs" onerror="this.src='https://cdn-icons-png.flaticon.com/512/53/53283.png'">
                            <span class="truncate uppercase oswald tracking-tight text-gray-700" style="max-width: 100px;">${e.nombre}</span>
                        </div>
                    </td>

        window.onscroll = function() { const btn = document.getElementById("btnVolverArriba"); if (btn) btn.style.display = (window.scrollY > 300) ? "block" : "none"; };
    </script>
</body>
</html>
